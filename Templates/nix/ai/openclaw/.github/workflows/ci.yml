# Purpose: CI pipeline - nix flake check, format check, and NixOS VM test.
# Maintainer: openclaw-flake contributors
name: CI
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
permissions:
  contents: read
  id-token: write # required by magic-nix-cache
jobs:
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://cache.numtide.com
            extra-trusted-public-keys = niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run nix flake check
        run: nix flake check --all-systems --print-build-logs
  format-check:
    name: treefmt format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Check formatting
        run: nix fmt -- --fail-on-change
  nixos-test:
    name: NixOS VM unit test
    runs-on: ubuntu-latest
    # VM tests require KVM; GitHub-hosted runners expose /dev/kvm on ubuntu-latest.
    needs: flake-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = https://cache.numtide.com
            extra-trusted-public-keys = niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run NixOS VM test
        run: |
          nix build \
            .#checks.x86_64-linux.openclaw-unit \
            --print-build-logs \
            --show-trace
      - name: Authenticate gh CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
      - name: Report test result
        if: failure()
        run: |
          gh issue create \
            --title "CI: NixOS VM test failed on ${{ github.ref }}" \
            --body "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "bug,ci"
