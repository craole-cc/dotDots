[global]
excludes = [
  ".dotsrc",
  "LICENSE",
  "**/node_modules/**",
  "**/target/**",
  "**/.git/**",
  "**/dist/**",
  "**/build/**",
  "**/review/**",
  "**/archive/**",
  "*.lock",
  "Assets/**",
  "*.diff",
  "*.patch",

  "**/dump.nix",
  "**/.bin/**",
  "**/.config/**",
  "**README.md",                               #TODO Temporary
  ".zed/**",                                   #TODO Temporary
  "Configuration/**",                          #TODO Temporary
  "Documentation/**",                          #TODO Temporary
  "Environment/**",                            #TODO Temporary
  "Modules/global/**",                         #TODO Temporary
  "Modules/nixos/configurations/hosts/QBX/**", #TODO Temporary
  "Modules/nixos/scripts/**",                  #TODO Temporary
  "Review/**",                                 #TODO Temporary
  "Scripts/**",                                #TODO Temporary
  "Tasks/**",                                  #TODO Temporary
  "Templates/**",                              #TODO Temporary
]

#|─────────────────────────────────────────────────────────────────|
#| Nix                                                             |
#|─────────────────────────────────────────────────────────────────|

# [formatter.nixfmt]
# includes = ["*.nix"]
# priority = 1
# command = "nixfmt"

[formatter.alejandra]
includes = ["*.nix"]
priority = 1
command = "alejandra"

[formatter.statix]
includes = ["*.nix"]
priority = 2
command = "sh"
options = ["-c", "for f in \"$@\"; do statix check \"$f\"; done"]

#|─────────────────────────────────────────────────────────────────|
#| Rust                                                            |
#|─────────────────────────────────────────────────────────────────|

[formatter.rust]
includes = ["*.rs"]
priority = 1
command = "rustfmt"
options = ["--edition", "2024"]

[formatter.leptosfmt]
includes = ["*.rs"]
priority = 2
command = "leptosfmt"

#|─────────────────────────────────────────────────────────────────|
#| Shellscript                                                     |
#|─────────────────────────────────────────────────────────────────|

[formatter.shellcheck]
includes = [
  "*.sh",
  ".env*",
  ".shellcheckrc",
  "*.bash",
  ".bash*",
  "Bin/shellscript/**",
]
excludes = ["*.md", "*.ps1", "*.psm1", "*.txt", "*.log"]
priority = 1
command = "shellcheck"
options = ["--rcfile", ".shellcheckrc"]

[formatter.shfmt]
includes = [
  "*.sh",
  "*.dotsrc",
  "*.env*",
  "*.shellcheckrc",
  # "*.bash*",
  "*.gitignore",
  "*.ignore",
  # "Bin/shellscript/**",
]
excludes = ["*.md", "*.ps1", "*.psm1", "*.txt", "*.log"]
priority = 2
command = "shfmt"
options = [
  "--apply-ignore",
  "--binary-next-line",
  "--space-redirects",
  "--case-indent",
  "--indent",
  "2",
  "--posix",
  "--write",
]

# [formatter.powershell]
# includes = ["*.ps1", "*.psm1, *.psd1"]
