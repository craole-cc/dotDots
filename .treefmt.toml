#|─────────────────────────────────────────────────────────────────|
#| Configuration                                                   |
#|─────────────────────────────────────────────────────────────────|

[formatter.toml]
includes = ["*.toml"]
command = "taplo"
options = ["format"]

[formatter.stylua]
includes = ["*.lua"]
command = "stylua"

#|─────────────────────────────────────────────────────────────────|
#| Markup                                                          |
#|─────────────────────────────────────────────────────────────────|

[formatter.markdown]
includes = ["*.md", "README"]
command = "markdownlint-cli2"
options = ["--fix", "--config", ".markdownlint.yaml"]
priority = 1

# [formatter.mdsh]
# command = "mdsh"
# excludes = []
# includes = ["README.md"]
# options = ["--inputs"]
# priority = 2

[formatter.deno]
excludes = []
includes = [
  "*.css",
  "*.html",
  "*.js",
  "*.json",
  "*.jsonc",
  "*.jsx",
  "*.less",
  "*.markdown",
  "*.md",
  "*.sass",
  "*.scss",
  "*.ts",
  "*.tsx",
  "*.yaml",
  "*.yml",
]
priority = 2
command = "deno"
options = ["fmt"]

[formatter.yamlfmt]
includes = ["*.yaml", "*.yml"]
priority = 1
command = "yamlfmt"
options = ["-formatter", "retain_line_breaks=true"]

[formatter.actionlint]
includes = [".github/workflows/*.yml", ".github/workflows/*.yaml"]
excludes = []
priority = 2
command = "actionlint"
options = []

[formatter.typstyle]
includes = ["*.typ", "*.typst"]
command = "typstyle"
