theme = "catppuccin_latte"

[editor]
[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[keys]
[keys.insert]
A-e = "normal_mode"
A-f = ["normal_mode", ":format"]
A-q = ["normal_mode", ":quit"]
A-space = "normal_mode"
A-w = ["normal_mode", ":write"]
[keys.normal]
A-e = ["collapse_selection", "keep_primary_selection"]
A-f = ["collapse_selection", "keep_primary_selection", ":format"]
A-j = ["extend_to_line_bounds", "delete_selection", "paste_after"]
A-k = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
A-q = ":quit"
A-w = ["collapse_selection", "keep_primary_selection", ":write"]
C-S-esc = "extend_line"
"C-]" = "indent"
C-s = ":write"
esc = ["collapse_selection", "keep_primary_selection"]
ret = ["open_below", "normal_mode"]
[keys.normal.g]
u = ":lsp-restart"
[keys.normal.space]
space = "file_picker_in_current_directory"
[keys.select]
A-e = ["collapse_selection", "keep_primary_selection", "normal_mode"]
A-f = ["collapse_selection", "keep_primary_selection", "normal_mode", ":format"]
A-q = ["normal_mode", ":quit"]
A-w = ["collapse_selection", "keep_primary_selection", "normal_mode", ":write"]

