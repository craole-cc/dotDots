# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
blocks:
  - alignment: left
    segments:
      # Session
      - background: p:black
        foreground: p:white
        invert_powerline: true
        powerline_symbol: ¯éÂ
        style: powerline
        template: '{{ .UserName }}@{{ .HostName }} '
        type: session
      # Path
      - background: p:orange
        foreground: p:white
        powerline_symbol: ¯é░
        properties:
          home_icon: '´Çò'
          style: folder
        style: powerline
        template: ' ´ü╗ {{ .Path }} '
        type: path
      # Git
      - background: p:green
        foreground: p:white
        powerline_symbol: ¯é░
        properties:
          script: |
            BRANCH=$(git branch --show-current 2>/dev/null)
            [[ -z $BRANCH ]] && exit
            status=$(git status --porcelain | awk '{print $1}')
            [[ $status == *"R"* ]] && bits+='>'
            [[ $status == *"A"* ]] && bits+='+'
            [[ $status == *"??"* ]] && bits+='?'
            [[ $status == *"D"* ]] && bits+='x'
            [[ $status == *"M"* ]] && bits+='!'
            [[ "$(git rev-list --count "@{u}..")" -gt 0 ]] && bits+='*'
            [[ -n $bits ]] && STAT=" ¯£¿ $bits"
            echo -n "¯£Ñ $BRANCH$STAT"
          shell: bash
        style: powerline
        template: ' {{ .Output }} '
        type: command
      # Execution time
      - background: p:darkred
        foreground: p:white
        powerline_symbol: ¯é░
        properties:
          always_enabled: true
          style: round
        style: powerline
        template: " \U000F051F{{ .FormattedMs }} "
        type: executiontime
      # Exit code
      - background: p:blue
        background_templates:
          - '{{ if gt .Code 0 }}p:red{{ end }}'
        foreground: p:white
        powerline_symbol: ¯é░
        properties:
          always_enabled: true
        style: diamond
        template: ' {{ if gt .Code 0 }}´Çì {{ reason .Code }}{{ else }}´Çî{{ end }} '
        trailing_diamond: ¯é┤
        type: status
    type: prompt
  - alignment: right
    segments:
      # Shell
      - background: p:black
        foreground: p:white
        style: plain
        template: <p:black,transparent>¯éÂ</>´äá {{ .Name }}<transparent,p:black>¯é▓</>
        type: shell
      # Battery
      - background_templates:
          - '{{if eq "Charging" .State.String }}p:green{{end}}'
          - '{{if eq "Discharging" .State.String}}p:orange{{end}}'
        foreground: p:white
        leading_diamond: ¯é▓
        properties:
          charged_icon: "\U000F0084"
          charging_icon: "\U000F0084"
          discharging_icon: "\U000F0079 "
        style: diamond
        template: " {{.Templates }}{{ .Percentage}}\U000F03F0 <transparent>¯é▓</>"
        templates:
          - "{{if eq \"Discharging\" .State.String}}{{if lt .Percentage 11}}\U000F007A{{else if lt .Percentage 21}}\U000F007B{{else if lt .Percentage 31}}\U000F007C{{else if lt .Percentage 41}}\U000F007D{{else if lt .Percentage 51}}\U000F007E{{else if lt .Percentage 61}}\U000F007E{{else if lt .Percentage 71}}\U000F0080{{else if lt .Percentage 81}}\U000F0081{{else if lt .Percentage 91}}\U000F0082{{else}}\U000F0079{{end}}{{end}}"
          - "{{if eq \"Charging\" .State.String}}{{ if lt .Percentage 21}}\U000F0086{{else if lt .Percentage 31}}\U000F0087{{else if lt .Percentage 41}}\U000F0088{{else if lt .Percentage 61}}\U000F0089{{else if lt .Percentage 81}}\U000F008A{{else if lt .Percentage 91}}\U000F008B{{else}}\U000F0084{{end}}{{end}}"
        templates_logic: first_match
        type: battery
      # Weather & time of day
      - background: p:blue
        foreground: p:white
        leading_diamond: ¯é▓
        properties:
          script: "now=\"$(date +'%I:%M%P')\"\nif [[ -f /tmp/weather.w ]]; then\n  update=\"$(cat /tmp/last_update.w)\"\n  if [[ -f /tmp/w_lock.w || $(date +'%s') -le $((update + 600)) ]]; then\n    echo -n \"$now\"\n    cat /tmp/weather.w\n    exit 0\n  fi\nelif [[ -f /tmp/w_lock.w ]]; then\n  echo \"$now\"\n  exit 0\nfi\ntouch /tmp/w_lock.w\nif ! res=$(curl -s wttr.in -Gsm2 --data-urlencode \"format=j1\"); then\n  echo \"$now\"\n  date +'%s' >/tmp/last_update.w\n  echo \U000F05AA >/tmp/weather.w\n  rm /tmp/w_lock.w\n  exit 0\nfi\nres=$(jq .current_condition[] -c <<<\"$res\")\ntemp=$(jq -r .temp_C <<<\"$res\")\nfeels_like=$(jq -r .FeelsLikeC <<<\"$res\")\n[[ $(bc -l <<<\"$feels_like!=$temp\") -eq 1 ]] && feels_string=\" feels $feels_like┬░C\"\nWWC_MAP='{\"113\":\"Sunny\",\"116\":\"PartlyCloudy\",\"119\":\"Cloudy\",\"122\":\"VeryCloudy\",\"143\":\"Fog\",\"176\":\"LightShowers\",\"179\":\"LightSleetShowers\",\"182\":\"LightSleet\",\"185\":\"LightSleet\",\"200\":\"ThunderyShowers\",\"227\":\"LightSnow\",\"230\":\"HeavySnow\",\"248\":\"Fog\",\"260\":\"Fog\",\"263\":\"LightShowers\",\"266\":\"LightRain\",\"281\":\"LightSleet\",\"284\":\"LightSleet\",\"293\":\"LightRain\",\"296\":\"LightRain\",\"299\":\"HeavyShowers\",\"302\":\"HeavyRain\",\"305\":\"HeavyShowers\",\"308\":\"HeavyRain\",\"311\":\"LightSleet\",\"314\":\"LightSleet\",\"317\":\"LightSleet\",\"320\":\"LightSnow\",\"323\":\"LightSnowShowers\",\"326\":\"LightSnowShowers\",\"329\":\"HeavySnow\",\"332\":\"HeavySnow\",\"335\":\"HeavySnowShowers\",\"338\":\"HeavySnow\",\"350\":\"LightSleet\",\"353\":\"LightShowers\",\"356\":\"HeavyShowers\",\"359\":\"HeavyRain\",\"362\":\"LightSleetShowers\",\"365\":\"LightSleetShowers\",\"368\":\"LightSnowShowers\",\"371\":\"HeavySnowShowers\",\"374\":\"LightSleetShowers\",\"377\":\"LightSleet\",\"386\":\"ThunderyShowers\",\"389\":\"ThunderyHeavyRain\",\"392\":\"ThunderySnowShowers\",\"395\":\"HeavySnowShowers\"}';NF_DAY_MAP='{\"Unknown\":\"\U000F068C\",\"Cloudy\":\"¯î¢\",\"Fog\":\"¯îô\",\"HeavyRain\":\"¯îÿ\",\"HeavyShowers\":\"¯îù\",\"HeavySnow\":\"¯îÜ\",\"HeavySnowShowers\":\"¯ì×\",\"LightRain\":\"¯îê\",\"LightShowers\":\"¯îë\",\"LightSleet\":\"¯Ä¬\",\"LightSleetShowers\":\"¯îå\",\"LightSnow\":\"¯îè\",\"LightSnowShowers\":\"¯ìƒ\",\"PartlyCloudy\":\"¯îé\",\"Sunny\":\"¯îì\",\"ThunderyHeavyRain\":\"¯îØ\",\"ThunderyShowers\":\"¯î£\",\"ThunderySnowShowers\":\"¯ìÑ\",\"VeryCloudy\":\"¯îÆ\"}';NF_NIGHT_MAP='{\"Unknown\":\"\U000F068C\",\"Cloudy\":\"¯î¢\",\"Fog\":\"¯îô\",\"HeavyRain\":\"¯îÿ\",\"HeavyShowers\":\"¯îù\",\"HeavySnow\":\"¯îÜ\",\"HeavySnowShowers\":\"¯ì×\",\"LightRain\":\"¯î│\",\"LightShowers\":\"¯î┤\",\"LightSleet\":\"¯Ä½\",\"LightSleetShowers\":\"¯Ä½\",\"LightSnow\":\"¯îÁ\",\"LightSnowShowers\":\"¯ìá\",\"PartlyCloudy\":\"¯î«\",\"Sunny\":\"¯î½\",\"ThunderyHeavyRain\":\"¯îØ\",\"ThunderyShowers\":\"¯î£\",\"ThunderySnowShowers\":\"¯ìª\",\"VeryCloudy\":\"¯îÆ\"}'\ncur_h=\"$(date +'%H')\" ;wwc=\"$(jq '.weatherCode' <<<\"$res\")\"\nif [[ $cur_h -gt 18 || $cur_h -lt 6 ]]; then icon=$(jq -r \".$(echo \"$WWC_MAP\" | jq -r \".$wwc\")\" <<<\"$NF_DAY_MAP\")\nelse icon=$(jq -r \".$(echo \"$WWC_MAP\" | jq -r \".$wwc\")\" <<<\"$NF_NIGHT_MAP\"); fi\nweather=\"$icon  $temp┬░C$feels_string\"\necho \"$now $weather\"\ndate +'%s' >/tmp/last_update.w\necho \"$weather\" >/tmp/weather.w\nrm /tmp/w_lock.w\n"
        style: diamond
        template: '{{ .Output }}'
        trailing_diamond: ¯é┤
        type: command
    type: rprompt
final_space: true
console_title_template: ´äá {{ .Shell }} in {{ if ne .Folder "~"}}´ü╗ {{ .Folder }}{{else}}´Çò{{end}}
palette:
  black: '#33395b'
  blue: '#359ddd'
  darkred: '#7c0a16'
  green: '#277b48'
  orange: '#ff972e'
  red: '#de3142'
  white: '#efeef4'
secondary_prompt:
  background: transparent
  foreground: p:white
  template: '´üí '
transient_prompt:
  background: transparent
  foreground: p:white
  template: '´üí '
version: 3
